spring:
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:3308/db_auth?sslmode=disable
        username: auth_user
        password: auth_pass

  
    flyway:
        url: jdbc:postgresql://localhost:3308/db_auth?sslmode=disable
        user: flyway_user
        password: flyway_pass

eureka:
    client:
        enabled: true
        register-with-eureka: true
        fetch-registry: true
        serviceUrl:
            defaultZone: http://localhost:8761/eureka

server:
    port: 8004 