spring:
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:3308/db_auth?sslmode=disable
        username: auth_user
        password: auth_pass

    flyway:
        url: jdbc:postgresql://localhost:3308/db_auth?sslmode=disable
        user: flyway_user
        password: flyway_pass
        default-schema: auth
        schemas: auth
        create-schemas: false


eureka:
    client:
        enabled: false

server:
    port: 8004
